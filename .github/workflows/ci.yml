name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR or commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Grant permission to post PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Lint, Format & Unit Tests
    # Skip push events from PR merges — already validated by the PR run
    if: >-
      github.event_name == 'pull_request' ||
      github.event.head_commit.committer.username != 'web-flow'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: |
          echo "<details><summary>ESLint Report</summary>" > eslint.md
          echo "" >> eslint.md
          echo '```text' >> eslint.md
          set +e
          NO_COLOR=1 pnpm lint >> eslint.md 2>&1
          status=$?
          set -e
          echo '```' >> eslint.md
          echo "</details>" >> eslint.md
          exit "$status"

      - name: Prettier
        id: prettier
        continue-on-error: true
        run: |
          echo "<details><summary>Prettier Report</summary>" > prettier.md
          echo "" >> prettier.md
          echo '```text' >> prettier.md
          set +e
          NO_COLOR=1 pnpm format:check >> prettier.md 2>&1
          status=$?
          set -e
          echo '```' >> prettier.md
          echo "</details>" >> prettier.md
          exit "$status"

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        run: |
          echo "<details><summary>TypeScript Report</summary>" > typecheck.md
          echo "" >> typecheck.md
          echo '```text' >> typecheck.md
          set +e
          NO_COLOR=1 pnpm typecheck >> typecheck.md 2>&1
          status=$?
          set -e
          echo '```' >> typecheck.md
          echo "</details>" >> typecheck.md
          exit "$status"

      - name: Unit Tests
        id: vitest
        continue-on-error: true
        run: |
          echo "<details><summary>Unit Tests Report</summary>" > vitest.md
          echo "" >> vitest.md
          echo '```text' >> vitest.md
          set +e
          NO_COLOR=1 pnpm test:run >> vitest.md 2>&1
          status=$?
          set -e
          echo '```' >> vitest.md
          echo "</details>" >> vitest.md
          exit "$status"

      - name: Create PR Comment
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## Quality Checks Report" > pr-report.md
          echo "Here are the results of the quality checks:" >> pr-report.md
          echo "" >> pr-report.md
          for report in eslint.md prettier.md typecheck.md vitest.md; do
            if [ -f "$report" ]; then
              cat "$report" >> pr-report.md
            else
              name="${report%.md}"
              echo "<details><summary>${name} Report</summary>" >> pr-report.md
              echo "" >> pr-report.md
              echo '```text' >> pr-report.md
              echo "This check did not run or did not create a report file." >> pr-report.md
              echo '```' >> pr-report.md
              echo "</details>" >> pr-report.md
            fi
            echo "" >> pr-report.md
          done

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-report
          path: pr-report.md

      - name: Check Job Status
        if: always()
        run: |
          failed=0

          for check in eslint prettier typecheck vitest; do
            case "$check" in
              eslint) outcome="${{ steps.eslint.outcome }}" ;;
              prettier) outcome="${{ steps.prettier.outcome }}" ;;
              typecheck) outcome="${{ steps.typecheck.outcome }}" ;;
              vitest) outcome="${{ steps.vitest.outcome }}" ;;
            esac

            if [ "$outcome" = "failure" ]; then
              echo "::error::${check} failed"
              if [ -f "${check}.md" ]; then
                cat "${check}.md"
              fi
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  e2e:
    name: E2E Tests
    # Skip push events from PR merges — already validated by the PR run
    if: >-
      github.event_name == 'pull_request' ||
      github.event.head_commit.committer.username != 'web-flow'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
      E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests
        id: e2e
        continue-on-error: true
        run: |
          echo "<details><summary>E2E Tests Report</summary>" > e2e.md
          echo "" >> e2e.md
          echo '```text' >> e2e.md
          set +e
          NO_COLOR=1 pnpm test:e2e >> e2e.md 2>&1
          status=$?
          set -e
          echo '```' >> e2e.md
          echo "</details>" >> e2e.md
          exit "$status"

      - name: Create E2E PR Comment
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## E2E Checks Report" > pr-e2e-report.md
          echo "Here are the results of the Playwright E2E tests:" >> pr-e2e-report.md
          echo "" >> pr-e2e-report.md
          if [ -f e2e.md ]; then
            cat e2e.md >> pr-e2e-report.md
          else
            echo "<details><summary>E2E Tests Report</summary>" >> pr-e2e-report.md
            echo "" >> pr-e2e-report.md
            echo '```text' >> pr-e2e-report.md
            echo "The E2E check did not run or did not create a report file." >> pr-e2e-report.md
            echo '```' >> pr-e2e-report.md
            echo "</details>" >> pr-e2e-report.md
          fi

      - name: Comment PR (E2E)
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-report
          path: pr-e2e-report.md

      - name: Check E2E Job Status
        if: always()
        run: |
          if [ "${{ steps.e2e.outcome }}" == "failure" ]; then
             echo "E2E tests failed."
             exit 1
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
