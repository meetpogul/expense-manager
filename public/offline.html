<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(100%, 560px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: color-mix(in srgb, CanvasText 72%, transparent);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline.</h1>
      <p>
        The app shell is available. Reconnect to refresh pages that were not
        cached during your previous session.
      </p>
    </main>
  </body>
</html>
